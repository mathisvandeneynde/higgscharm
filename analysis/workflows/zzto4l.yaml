datasets:
  data:
    - muon
    - electron
    - muon_electron
  mc:
    - higgs
    - qqtozz
    - ggtozz
object_selection:
  muons:
    field: events.Muon
    add_cut:
      is_loose:
        - events.Muon.pt > 5
        - np.abs(events.Muon.eta) < 2.4
        - np.abs(events.Muon.dxy) < 0.5
        - np.abs(events.Muon.dz) < 1
        - events.Muon.isGlobal | events.Muon.isTracker
      is_relaxed:
        - objects['muons'].is_loose
        - np.abs(events.Muon.sip3d) < 4
      is_tight:
        - objects['muons'].is_loose
        - objects['muons'].is_relaxed
        - events.Muon.isPFcand | ((events.Muon.highPtId > 0) & (events.Muon.pt > 200))
  electrons:
    field: events.Electron
    add_cut: 
      is_loose:
        - events.Electron.pt > 7
        - np.abs(events.Electron.eta) < 2.5
        - np.abs(events.Electron.dxy) < 0.5
        - np.abs(events.Electron.dz) < 1
      is_relaxed:
        - objects['electrons'].is_loose
        - np.abs(events.Electron.sip3d) < 4
      is_tight:
        - objects['electrons'].is_loose
        - objects['electrons'].is_relaxed
        - working_points.electron_id(events, 'bdt')
    cuts:
      - delta_r_higher(events.Electron, objects['muons'], 0.05)
  fsr_photons:
    field: events.FsrPhoton
    cuts:
      - events.FsrPhoton.pt > 2
      - np.abs(events.FsrPhoton.eta) < 2.4
      - events.FsrPhoton.relIso03 < 1.8
  leptons:
    field: select_zzto4l_leptons
  zcandidates:
    field: select_zcandidates 
    add_cut:
      is_ossf:
        - objects['zcandidates'].l1.pdgId == -objects['zcandidates'].l2.pdgId
      is_sr:
        - objects['zcandidates'].is_ossf
        - objects['zcandidates'].l1.is_tight & objects['zcandidates'].l2.is_tight
    cuts: 
      - (objects['zcandidates'].p4.mass > 12) & (objects['zcandidates'].p4.mass < 120)
  zzcandidates:
    field: select_zzcandidates
    cuts:
      - objects['zzcandidates'].z1.is_sr & objects['zzcandidates'].z2.is_sr
      - (objects['zzcandidates'].z1.p4 + objects['zzcandidates'].z2.p4).mass > 70
  best_zzcandidate:
    field: select_best_zzcandidate
  zz_mass_4mu:
    field: select_mass_4mu_sr
  zz_mass_4e:
    field: select_mass_4e_sr
  zz_mass_2mu2e:
    field: select_mass_2mu2e_sr
  zz_mass_2e2mu:
    field: select_mass_2e2mu_sr
  jets:
    field: events.Jet
    cuts:
      - events.Jet.pt > 20
      - np.abs(events.Jet.eta) < 2.5
      - working_points.jet_id(events, 'tightlepveto')
      - delta_r_higher(events.Jet, objects['leptons'], 0.4)
  cjets:
    field: events.Jet
    cuts:
      - events.Jet.pt > 20
      - np.abs(events.Jet.eta) < 2.5
      - working_points.jet_id(events, 'tightlepveto')
      - delta_r_higher(events.Jet, objects['leptons'], 0.4)
      - working_points.jet_particlenet_c(events, 'medium', year)
  zzcandidate_cjet_dphi_inclusive:
    field: select_dphi_inclusive
  zzcandidate_cjet_dphi_4e:
    field: select_dphi_4e
  zzcandidate_cjet_dphi_4mu:
    field: select_dphi_4mu
  zzcandidate_cjet_dphi_2mu2e:
    field: select_dphi_2mu2e
  zzcandidate_cjet_dphi_2e2mu:
    field: select_dphi_2e2mu
event_selection:
  hlt_paths:
    - SingleMu
    - DiMu
    - TriMu
    - SingleEle
    - DiEle
    - MuEle
  selections:
    trigger: get_zzto4l_trigger_mask(events, hlt_paths, dataset, year)
    lumimask: get_lumi_mask(events, year)
    atleast_one_goodvertex: events.PV.npvsGood > 0
    atleast_one_zz: ak.num(objects['zzcandidates']) >= 1
  categories:
    base:
      - trigger
      - lumimask
      - atleast_one_goodvertex
      - atleast_one_zz
corrections:
  objects:
    - jec
    - jet_vetomaps
    - muon_ss
    - electon_ss
  event_weights:
    genWeight: true
    pileupWeight: true
    partonshowerWeight: true
    lhepdfWeight: true
    lhescaleWeight: true
    nnlopsWeight: true
    electron:
      - id: false
      - reco: true
      - trigger: false
    ctagging: 
      - wp: medium
histogram_config:
  add_syst_axis: true
  add_weight: true
  axes:
    zz_mass_inclusive:
      type: Regular
      bins: 66
      start: 70
      stop: 400
      label: $m_{4\ell}$ [GeV]
      expression: (objects['best_zzcandidate'].z1.p4 + objects['best_zzcandidate'].z2.p4).mass
    zz_pt_inclusive:
      type: Regular
      bins: 40
      start: 0
      stop: 400
      label: $p_T(4\ell)$ [GeV]
      expression: (objects['best_zzcandidate'].z1.p4 + objects['best_zzcandidate'].z2.p4).pt
    zz_mass_4mu:
      type: Regular
      bins: 66
      start: 70
      stop: 400
      label: $m_{4\mu}$ [GeV]
      expression: objects['zz_mass_4mu']
    zz_mass_4e:
      type: Regular
      bins: 66
      start: 70
      stop: 400
      label: $m_{4e}$ [GeV]
      expression: objects['zz_mass_4e']
    zz_mass_2mu2e:
      type: Regular
      bins: 66
      start: 70
      stop: 400
      label: $m_{2\mu 2e}$ [GeV]
      expression: objects['zz_mass_2mu2e']
    zz_mass_2e2mu:
      type: Regular
      bins: 66
      start: 70
      stop: 400
      label: $m_{2e2\mu}$ [GeV]
      expression: objects['zz_mass_2e2mu']
    jet_multiplicity:
      type: Integer
      start: 0
      stop: 14
      label: Jet Multiplicity
      expression: ak.num(objects['jets'])
    jet_pt:
      type: Regular
      bins: 50
      start: 20
      stop: 500
      label: $p_T(j)$ [GeV]
      expression: objects['jets'].pt
    jet_eta:
      type: Regular
      bins: 50
      start: -2.4
      stop: 2.4
      label: $\eta(j)$
      expression: objects['jets'].eta
    jet_phi:
      type: Regular
      bins: 50
      start: -3.14159
      stop: 3.14159
      label: $\phi(j)$
      expression: objects['jets'].phi
    leadingjet_pnet_cvsl:
      type: Regular
      bins: 50
      start: 0
      stop: 1
      label: Leading Jet btagPNetCvL
      expression: ak.pad_none(objects['jets'], target=2)[:, 0].btagPNetCvL
    leadingjet_pnet_cvsb:
      type: Regular
      bins: 50
      start: 0
      stop: 1
      label: Leading Jet btagPNetCvB
      expression: ak.pad_none(objects['jets'], target=2)[:, 0].btagPNetCvB
    leadingjet_flavour:
      type: IntCategory
      categories:
        - 0
        - 4
        - 5
      label: Leading Jet HadronFlavour
      expression: ak.pad_none(objects['jets'], target=2)[:, 0].hadronFlavour
    subleadingjet_pnet_cvsl:
      type: Regular
      bins: 50
      start: 0
      stop: 1
      label: Subleading Jet btagPNetCvL
      expression: ak.pad_none(objects['jets'], target=2)[:, 1].btagPNetCvL
    subleadingjet_pnet_cvsb:
      type: Regular
      bins: 50
      start: 0
      stop: 1
      label: Subleading Jet btagPNetCvB
      expression: ak.pad_none(objects['jets'], target=2)[:, 1].btagPNetCvB
    subleadingjet_flavour:
      type: IntCategory
      categories:
        - 0
        - 4
        - 5
      label: Subleading Jet HadronFlavour
      expression: ak.pad_none(objects['jets'], target=2)[:, 1].hadronFlavour
    cjets_multiplicity:
      type: Integer
      start: 0
      stop: 14
      label: PNet c-tagged (M) Jet Multiplicity
      expression: ak.num(objects['cjets'])
    leadingcjets_pt:
      type: Regular
      bins: 50
      start: 20
      stop: 500
      label: PNet c-tagged (M) Leading Jet $p_T$ [GeV]
      expression: ak.pad_none(objects['cjets'], target=2)[:, 0].pt
    leadingcjets_eta:
      type: Regular
      bins: 50
      start: -2.4
      stop: 2.4
      label: PNet c-tagged (M) Leading Jet $\eta$
      expression: ak.pad_none(objects['cjets'], target=2)[:, 0].eta
    leadingcjets_phi:
      type: Regular
      bins: 50
      start: -3.14159
      stop: 3.14159
      label: PNet c-tagged (M) Leading Jet $\phi$
      expression: ak.pad_none(objects['cjets'], target=2)[:, 0].phi
    cjets_h_dphi_inclusive:
      type: Regular
      bins: 50
      start: 0
      stop: 3.14159
      label: $|\Delta \phi(\text{c-Jet}, H_{4\ell})|$
      expression: np.abs(objects['zzcandidate_cjet_dphi_inclusive'])
    cjets_h_dphi_4e:
      type: Regular
      bins: 50
      start: 0
      stop: 3.14159
      label: $|\Delta \phi(\text{c-Jet}, H_{4e})|$
      expression: np.abs(objects['zzcandidate_cjet_dphi_4e'])
    cjets_h_dphi_4mu:
      type: Regular
      bins: 50
      start: 0
      stop: 3.14159
      label: $|\Delta \phi(\text{c-Jet}, H_{4\mu})|$
      expression: np.abs(objects['zzcandidate_cjet_dphi_4mu'])
    cjets_h_dphi_2mu2e:
      type: Regular
      bins: 50
      start: 0
      stop: 3.14159
      label: $|\Delta \phi(\text{c-Jet}, H_{2\mu 2e})|$
      expression: np.abs(objects['zzcandidate_cjet_dphi_2mu2e'])
    cjets_h_dphi_2e2mu:
      type: Regular
      bins: 50
      start: 0
      stop: 3.14159
      label: $|\Delta \phi(\text{c-Jet}, H_{2e2\mu})|$
      expression: np.abs(objects['zzcandidate_cjet_dphi_2e2mu'])
  layout:
    zz_inclusive:
      - zz_mass_inclusive
      - zz_pt_inclusive
    zz_mass_4e:
      - zz_mass_4e
    zz_mass_4mu:
      - zz_mass_4mu
    zz_mass_2e2mu:
      - zz_mass_2e2mu
    zz_mass_2mu2e:
      - zz_mass_2mu2e
    jet_multiplicity:
      - jet_multiplicity
    jet:
      - jet_pt
      - jet_eta
      - jet_phi
    leading_jet:
      - leadingjet_flavour
      - leadingjet_pnet_cvsl
      - leadingjet_pnet_cvsb
    subleading_jet:
      - subleadingjet_flavour
      - subleadingjet_pnet_cvsl
      - subleadingjet_pnet_cvsb
    cjets_multiplicity:
      - cjets_multiplicity
    leading_cjet:
      - leadingcjets_pt
      - leadingcjets_eta
      - leadingcjets_phi
    cjets_h_dphi_inclusive:
      - cjets_h_dphi_inclusive
    cjets_h_dphi_4e:
      - cjets_h_dphi_4e
    cjets_h_dphi_4mu:
      - cjets_h_dphi_4mu
    cjets_h_dphi_2mu2e:
      - cjets_h_dphi_2mu2e
    cjets_h_dphi_2e2mu:
      - cjets_h_dphi_2e2mu