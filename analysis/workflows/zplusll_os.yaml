datasets:
  data:
    - muon
    - electron
    - muon_electron
  mc:
    - dy_nlo
    - wz
    - tt_semileptonic
    - zz
object_selection:
  muons:
    field: events.Muon
    add_cut:
      is_loose:
        - events.Muon.pt > 5
        - np.abs(events.Muon.eta) < 2.4
        - np.abs(events.Muon.dxy) < 0.5
        - np.abs(events.Muon.dz) < 1
        - events.Muon.isGlobal | events.Muon.isTracker
      is_relaxed:
        - objects['muons'].is_loose
        - np.abs(events.Muon.sip3d) < 4
      is_tight:
        - objects['muons'].is_loose
        - objects['muons'].is_relaxed
        - events.Muon.isPFcand | ((events.Muon.highPtId > 0) & (events.Muon.pt > 200))
  electrons:
    field: events.Electron
    add_cut: 
      is_loose:
        - events.Electron.pt > 7
        - np.abs(events.Electron.eta) < 2.5
        - np.abs(events.Electron.dxy) < 0.5
        - np.abs(events.Electron.dz) < 1
      is_relaxed:
        - objects['electrons'].is_loose
        - np.abs(events.Electron.sip3d) < 4
      is_tight:
        - objects['electrons'].is_loose
        - objects['electrons'].is_relaxed
        - working_points.electron_id(events, 'bdt')
    cuts:
      - delta_r_higher(events.Electron, objects['muons'], 0.05)
  fsr_photons:
    field: events.FsrPhoton
    cuts:
      - events.FsrPhoton.pt > 2
      - np.abs(events.FsrPhoton.eta) < 2.4
      - events.FsrPhoton.relIso03 < 1.8
  leptons:
    field: select_zzto4l_leptons
  zcandidates:
    field: select_zcandidates 
    add_cut:
      is_ossf:
        - objects['zcandidates'].l1.pdgId == -objects['zcandidates'].l2.pdgId
      is_sr:
        - objects['zcandidates'].is_ossf
        - (1*objects['zcandidates'].l1.is_tight + 1*objects['zcandidates'].l2.is_tight) == 2
      is_1fcr:
        - objects['zcandidates'].is_ossf
        - objects['zcandidates'].l1.is_relaxed
        - objects['zcandidates'].l2.is_relaxed
        - (1*objects['zcandidates'].l1.is_tight + 1*objects['zcandidates'].l2.is_tight) == 1
      is_2fcr:
        - objects['zcandidates'].is_ossf
        - objects['zcandidates'].l1.is_relaxed
        - objects['zcandidates'].l2.is_relaxed
        - (1*objects['zcandidates'].l1.is_tight + 1*objects['zcandidates'].l2.is_tight) == 0
    cuts: 
      - (objects['zcandidates'].p4.mass > 12) & (objects['zcandidates'].p4.mass < 120)
  zzcandidates:
    field: select_zzcandidates
    cuts:
      - objects['zzcandidates'].z1.is_sr & objects['zzcandidates'].z2.is_sr
      - (objects['zzcandidates'].z1.p4 + objects['zzcandidates'].z2.p4).mass > 70    
  zllcandidates:
    field: select_zllcandidates_os
    cuts:
      - objects['zllcandidates'].z1.is_sr & (objects['zllcandidates'].z2.is_1fcr | objects['zllcandidates'].z2.is_2fcr)
      - (objects['zllcandidates'].z1.p4 + objects['zllcandidates'].z2.p4).mass > 70
  best_zllcandidate_1fcr:
    field: select_best_1fcr_zllcandidate
  best_zllcandidate_2fcr:
    field: select_best_2fcr_zllcandidate
  mass_2e2e_1fcr:
    field: select_mass_2e2e_1fcr
  mass_2e2mu_1fcr:
    field: select_mass_2e2mu_1fcr
  mass_2mu2e_1fcr:
    field: select_mass_2mu2e_1fcr
  mass_2mu2mu_1fcr:
    field: select_mass_2mu2mu_1fcr
  mass_2e2e_2fcr:
    field: select_mass_2e2e_2fcr
  mass_2e2mu_2fcr:
    field: select_mass_2e2mu_2fcr
  mass_2mu2e_2fcr:
    field: select_mass_2mu2e_2fcr
  mass_2mu2mu_2fcr:
    field: select_mass_2mu2mu_2fcr
event_selection:
  hlt_paths:
    - SingleMu
    - DiMu
    - TriMu
    - SingleEle
    - DiEle
    - MuEle
  selections:
    trigger: get_zzto4l_trigger_mask(events, hlt_paths, dataset, year)
    lumimask: get_lumi_mask(events, year)
    atleast_one_goodvertex: events.PV.npvsGood > 0
    no_sr_candidate: ak.num(objects['zzcandidates']) == 0
    atleast_one_zll: ak.num(objects['zllcandidates']) >= 1
  categories:
    base:
      - trigger
      - lumimask
      - atleast_one_goodvertex
      - no_sr_candidate
      - atleast_one_zll
corrections:
  objects:
    - jets
    - muons
    - electrons
  event_weights:
    genWeight: true
    pileupWeight: true
    partonshowerWeight: false
    lhepdfWeight: false
    lhescaleWeight: false
    nnlopsWeight: false
    electron:
      - id: false
      - reco: true
      - trigger: false
histogram_config:
  add_syst_axis: true
  add_weight: true
  axes:
    zll_mass_2e2e_1fcr:
      type: Regular
      bins: 40
      start: 70
      stop: 870
      label: $m_{2e2e}$ [GeV]
      expression: objects['mass_2e2e_1fcr']
    zll_mass_2mu2e_1fcr:
      type: Regular
      bins: 40
      start: 70
      stop: 870
      label: $m_{2\mu2e}$ [GeV]
      expression: objects['mass_2mu2e_1fcr']
    zll_mass_2e2mu_1fcr:
      type: Regular
      bins: 40
      start: 70
      stop: 870
      label: $m_{2e2\mu}$ [GeV]
      expression: objects['mass_2e2mu_1fcr']
    zll_mass_2mu2mu_1fcr:
      type: Regular
      bins: 40
      start: 70
      stop: 870
      label: $m_{2\mu 2\mu}$ [GeV]
      expression: objects['mass_2mu2mu_1fcr']
    l3_pt_1fcr:
      type: Variable
      edges:
        - 5
        - 7
        - 10
        - 20
        - 30
        - 40
        - 50
        - 80
      label: 3P1F $p_T(\ell_3)$ [GeV]
      expression: objects['best_zllcandidate_1fcr'].z2.l1.pt
    l3_eta_1fcr:
      type: Regular
      bins: 50
      start: -2.5
      stop: 2.5
      label: 3P1F $\eta(\ell_3)$
      expression: np.abs(objects['best_zllcandidate_1fcr'].z2.l1.eta)
    l3_istight_1fcr:
      type: Boolean
      label: is_tight 3P1F $\ell_3$
      expression: objects['best_zllcandidate_1fcr'].z2.l1.is_tight
    l3_pgid_1fcr:
      type: IntCategory
      categories:
        - 11
        - 13
      label: 3P1F $\ell_3$ pdgid
      expression: np.abs(objects['best_zllcandidate_1fcr'].z2.l1.pdgId)
    l4_pt_1fcr:
