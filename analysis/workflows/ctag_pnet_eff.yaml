datasets:
  mc:
    - higgs
    - qqtozz
    - ggtozz
    - dy_nlo
    - singletop
    - diboson
    - wz
    - tt
object_selection:
  jets:
    field: events.Jet
    add_cut:
      pass_loose_wp:
        - working_points.jet_particlenet_c(events, 'loose', year)
      pass_medium_wp:
        - working_points.jet_particlenet_c(events, 'medium', year)
      pass_tight_wp:
        - working_points.jet_particlenet_c(events, 'tight', year)
    cuts:
      - events.Jet.pt > 20
      - np.abs(events.Jet.eta) < 2.5
      - working_points.jet_id(events, 'tightlepveto')
event_selection:
  hlt_paths:
    - SingleMu
    - DiMu
    - TriMu
    - SingleEle
    - DiEle
    - MuEle
  selections:
    trigger: get_zzto4l_trigger_mask(events, hlt_paths, dataset, year)
    atleast_one_goodvertex: events.PV.npvsGood > 0
  categories:
    base:
      - trigger
      - atleast_one_goodvertex
corrections:
  objects:
    - jets
    - jets_veto
  apply_obj_syst: false
  event_weights:
    genWeight: true
    pileupWeight: true
histogram_config:
  add_weight: false
  add_syst_axis: false
  axes:
    jet_pt:
      type: Regular
      bins: 50
      start: 20
      stop: 500
      label: $p_T(j)$ [GeV]
      expression: objects['jets'].pt
    jet_abseta:
      type: Regular
      bins: 50
      start: 0
      stop: 2.5
      label: $\eta(j)$
      expression: np.abs(objects['jets'].eta)
    jet_flavor:
      type: IntCategory
      categories:
        - 0
        - 4
        - 5
      label: Jet HadronFlavour
      expression: objects['jets'].hadronFlavour
    jet_pass_loose_wp:
      type: Boolean
      label: pass loose WP
      expression: objects['jets'].pass_loose_wp
    jet_pass_medium_wp:
      type: Boolean
      label: pass medium WP
      expression: objects['jets'].pass_medium_wp
    jet_pass_tight_wp:
      type: Boolean
      label: pass tight WP
      expression: objects['jets'].pass_tight_wp
  layout:
    eff_loose_wp:
      - jet_pt
      - jet_abseta
      - jet_flavor
      - jet_pass_loose_wp
    eff_meduim_wp:
      - jet_pt
      - jet_abseta
      - jet_flavor
      - jet_pass_medium_wp
    eff_tight_wp:
      - jet_pt
      - jet_abseta
      - jet_flavor
      - jet_pass_tight_wp